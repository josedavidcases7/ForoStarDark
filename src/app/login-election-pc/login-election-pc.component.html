<div class="container">
    <img [src]="loginImage" alt="Login Image" class="login-image" />
    
    <div class="separator"></div>
  
    <form class="login-form">
    
      <label for="nombre" class="label">{{ username_email }}</label>
      <input id="nombre" type="text" placeholder="Introduce tu usuario o email" />
  
      <label for="password" class="label">{{ titlePassword }}</label>
      <input id="password" type="password" placeholder="Introduce tu contraseña" />
  
      <div class="button-group">
        <button type="submit" class="btn" (click)="navigateToHome()">Iniciar sesión</button>
    </div>
  
    </form>
  </div>
