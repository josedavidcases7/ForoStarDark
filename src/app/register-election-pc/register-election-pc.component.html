<div class="container">
    <img [src]="loginImage" alt="Login Image" class="login-image" />
    
    <div class="separator"></div>
  
    <form class="login-form">
      <label for="email" class="label">{{ titleEmail }}</label>
      <input id="email" type="email" placeholder="Introduce tu email" />
  
      <label for="nombre" class="label">{{ username }}</label>
      <input id="nombre" type="text" placeholder="Introduce tu nombre de usuario" />
  
      <label for="password" class="label">{{ titlePassword }}</label>
      <input id="password" type="password" placeholder="Introduce tu contraseña" />
  
      <div class="button-group">
        <button type="button" class="btn secondary" (click)="navigateToLogin()">Registrarse</button>
      </div>
  
    </form>
  </div>
